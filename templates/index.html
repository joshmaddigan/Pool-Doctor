{% extends "base.html" %}

{% block header_action %}
    <button id="btn-settings" style="background: transparent; color: white; width: auto; padding: 0;">
        <svg xmlns="http://www.w3.org/2000/svg" style="height: 1.5rem; width: 1.5rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>
{% endblock %}

{% block content %}
    <!-- SCANNER SECTION -->
    <div class="scanner-grid">
        <div class="strip-preview-box">
            <img id="strip-preview" style="width: 100%; height: 100%; object-fit: contain;" class="hidden">
            <div id="preview-overlay" style="position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; padding: 0.5rem; text-align: center; font-size: 0.7rem; font-weight: 700;">
                <span id="preview-placeholder">Upload to start</span>
            </div>
        </div>

        <div class="digital-match-box">
            <div id="pad-fcl" class="pad"></div>
            <div id="pad-alk" class="pad"></div>
            <div id="pad-ph" class="pad"></div>
            <div id="pad-th" class="pad"></div>
        </div>
    </div>

    <!-- CONTROLS SECTION -->
    <div style="padding: 1.5rem;">
        <div class="control-group">
            <div class="control-label">
                <span>Chlorine</span>
                <span id="val-fcl" class="control-value">0.0</span>
            </div>
            <input type="range" id="slide-fcl" min="0" max="10" step="0.5" value="0">
        </div>

        <div class="control-group">
            <div class="control-label">
                <span>Alkalinity</span>
                <span id="val-alk" class="control-value">80</span>
            </div>
            <input type="range" id="slide-alk" min="0" max="240" step="10" value="80">
        </div>

        <div class="control-group">
            <div class="control-label">
                <span>pH Level</span>
                <span id="val-ph" class="control-value">7.4</span>
            </div>
            <input type="range" id="slide-ph" min="6.2" max="9.0" step="0.2" value="7.4">
        </div>

        <div class="control-group">
            <div class="control-label">
                <span>Hardness</span>
                <span id="val-th" class="control-value">250</span>
            </div>
            <input type="range" id="slide-th" min="0" max="1000" step="50" value="250">
        </div>

        <div id="camera-section" style="margin-top: 2rem;">
            <button id="camera-btn" class="btn-primary">
                📸 Take Photo / Scan Strip
            </button>
            <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">
        </div>

        <div style="margin-top: 1rem;">
            <button id="scan-manual-btn" class="btn-accent">
                🧪 Calculate Prescription
            </button>
        </div>
    </div>

    <!-- RESULTS SECTION -->
    <div id="results-card" class="card hidden" style="margin: 0 1.5rem; background: var(--bg-main);">
        <h2 style="font-size: 1rem; margin-top: 0;">Final Prescription:</h2>
        <ul id="plan-list" style="padding: 0; list-style: none;"></ul>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin: 0; font-size: 1.25rem;">App Settings</h2>
                <button id="close-settings" style="width: auto; background: transparent; color: var(--text-muted); padding: 0;">✕</button>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label class="control-label">Test Strip Brand</label>
                <select id="brand-select" style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; font-weight: 600;">
                    <option value="aquarius_4way">Aquarius 4-Way</option>
                    <option value="clorox_6way">Clorox Pool&Spa 6-Way</option>
                    <option value="aquachek_7way">AquaChek 7-Way</option>
                    <option value="hth_6way">HTH 6-Way</option>
                    <option value="custom">Custom (Manual Only)</option>
                </select>
            </div>

            <div class="card" style="background: var(--bg-main); padding: 1rem;">
                <label class="control-label" style="color: var(--accent);">Pool Volume Calculator</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
                    <div>
                        <label class="text-xs uppercase font-bold text-muted">Diameter (ft)</label>
                        <input type="number" id="calc-diameter" style="width: 100%; padding: 0.5rem; border-radius: 0.25rem; border: 1px solid #cbd5e1;">
                    </div>
                    <div>
                        <label class="text-xs uppercase font-bold text-muted">Depth (ft)</label>
                        <input type="number" id="calc-depth" style="width: 100%; padding: 0.5rem; border-radius: 0.25rem; border: 1px solid #cbd5e1;">
                    </div>
                </div>
                <button id="btn-calc-vol" class="btn-dark" style="padding: 0.5rem; font-size: 0.8rem; margin-bottom: 1rem;">Calculate Liters</button>
                
                <label class="text-xs uppercase font-bold text-muted">Saved Volume (Liters)</label>
                <input type="number" id="saved-volume" style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #cbd5e1; font-weight: 900; font-size: 1.25rem;" value="20000">
            </div>

            <button id="save-settings" class="btn-primary" style="margin-top: 1rem;">Save & Close</button>
        </div>
    </div>

    <script>
        const sliders = { fcl: document.getElementById('slide-fcl'), alk: document.getElementById('slide-alk'), ph: document.getElementById('slide-ph'), th: document.getElementById('slide-th') };
        const pads = { fcl: document.getElementById('pad-fcl'), alk: document.getElementById('pad-alk'), ph: document.getElementById('pad-ph'), th: document.getElementById('pad-th') };
        const displayVals = { fcl: document.getElementById('val-fcl'), alk: document.getElementById('val-alk'), ph: document.getElementById('val-ph'), th: document.getElementById('val-th') };
        const preview = document.getElementById('strip-preview');
        const placeholder = document.getElementById('preview-placeholder');

        // SLIDER COLOR LOGIC
        sliders.fcl.addEventListener('input', (e) => {
            const val = e.target.value;
            displayVals.fcl.innerText = val;
            pads.fcl.style.backgroundColor = val > 0 ? `hsl(300, ${val * 10}%, ${90 - (val * 4)}%)` : '#f8fafc';
        });

        sliders.alk.addEventListener('input', (e) => {
            displayVals.alk.innerText = e.target.value;
            pads.alk.style.backgroundColor = `hsl(${60 + (e.target.value * 0.3)}, 60%, ${50 - (e.target.value * 0.1)}%)`;
        });

        sliders.ph.addEventListener('input', (e) => {
            displayVals.ph.innerText = e.target.value;
            let hue = 40 - ((e.target.value - 6.2) * 20);
            pads.ph.style.backgroundColor = `hsl(${hue < 0 ? 0 : hue}, 80%, 50%)`;
        });

        sliders.th.addEventListener('input', (e) => {
            displayVals.th.innerText = e.target.value;
            let val = parseInt(e.target.value);
            pads.th.style.backgroundColor = `hsl(${210 + (val * 0.1)}, 60%, ${70 - (val * 0.05)}%)`;
        });

        Object.values(sliders).forEach(s => s.dispatchEvent(new Event('input')));

        let pendingBase64 = null;
        let pendingCoords = [];
        let savedVolume = localStorage.getItem('pool_volume') || 20000;
        let savedBrand = localStorage.getItem('strip_brand') || 'aquarius_4way';

        const modal = document.getElementById('settings-modal');
        const inputVol = document.getElementById('saved-volume');
        const selectBrand = document.getElementById('brand-select');
        
        document.getElementById('btn-settings').addEventListener('click', () => {
            inputVol.value = savedVolume;
            selectBrand.value = savedBrand;
            modal.classList.remove('hidden');
        });
        
        document.getElementById('close-settings').addEventListener('click', () => modal.classList.add('hidden'));
        
        document.getElementById('btn-calc-vol').addEventListener('click', () => {
            const d = parseFloat(document.getElementById('calc-diameter').value);
            const h = parseFloat(document.getElementById('calc-depth').value);
            if (d && h) {
                const r = d / 2;
                const cuFt = Math.PI * (r * r) * h;
                inputVol.value = Math.round(cuFt * 28.3168);
            }
        });

        document.getElementById('save-settings').addEventListener('click', () => {
            savedVolume = inputVol.value;
            savedBrand = selectBrand.value;
            localStorage.setItem('pool_volume', savedVolume);
            localStorage.setItem('strip_brand', savedBrand);
            modal.classList.add('hidden');
            applyBrandUI();
        });

        function applyBrandUI() {
            if (savedBrand === 'custom') {
                document.getElementById('camera-section').classList.add('hidden');
                placeholder.innerText = "Manual entry only";
            } else {
                document.getElementById('camera-section').classList.remove('hidden');
                if (!pendingBase64) {
                    placeholder.innerText = "Upload to start";
                } else if (pendingCoords.length < 4) {
                    placeholder.innerText = `Tap the ${padNames[pendingCoords.length]} pad...`;
                } else {
                    placeholder.innerText = "Analyzing...";
                }
            }
        }
        applyBrandUI();

        const padNames = ["Chlorine", "Alkalinity", "pH", "Hardness"];

        document.getElementById('camera-btn').addEventListener('click', () => {
            if (pendingBase64) {
                if(!confirm("Start new scan?")) return;
                pendingBase64 = null;
                pendingCoords = [];
                preview.src = '';
                preview.classList.add('hidden');
                placeholder.innerText = "Upload to start";
            }
            document.getElementById('camera-input').click();
        });

        document.getElementById('camera-input').addEventListener('change', (e) => {
            if (!e.target.files.length) return;
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                pendingBase64 = event.target.result;
                preview.src = pendingBase64;
                preview.classList.remove('hidden');
                pendingCoords = [];
                placeholder.innerText = `Tap ${padNames[0]}...`;
            };
            reader.readAsDataURL(file);
        });

        preview.addEventListener('click', async (e) => {
            if (!pendingBase64 || pendingCoords.length >= 4) return;
            const rect = preview.getBoundingClientRect();
            const ratio = Math.min(rect.width / preview.naturalWidth, rect.height / preview.naturalHeight);
            const renderWidth = preview.naturalWidth * ratio;
            const renderHeight = preview.naturalHeight * ratio;
            const offsetX = (rect.width - renderWidth) / 2;
            const offsetY = (rect.height - renderHeight) / 2;
            const clickX = e.clientX - rect.left - offsetX;
            const clickY = e.clientY - rect.top - offsetY;
            if (clickX < 0 || clickX > renderWidth || clickY < 0 || clickY > renderHeight) return;
            const x = Math.round(clickX / ratio);
            const y = Math.round(clickY / ratio);
            pendingCoords.push({x, y});
            
            if (pendingCoords.length < 4) {
                placeholder.innerText = `Tap ${padNames[pendingCoords.length]}...`;
            } else {
                placeholder.innerText = "Analyzing...";
                const payload = { 
                    image_base64: pendingBase64, 
                    coords: pendingCoords,
                    brand: savedBrand,
                    volume: savedVolume
                };
                try {
                    const response = await fetch('/analyze_pixels', { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload) 
                    });
                    const data = await response.json();
                    if(data.detected_levels) {
                        sliders.fcl.value = data.detected_levels.fcl;
                        sliders.alk.value = data.detected_levels.alk;
                        sliders.ph.value = data.detected_levels.ph;
                        sliders.th.value = data.detected_levels.th;
                        Object.values(sliders).forEach(s => s.dispatchEvent(new Event('input')));
                        displayPlan(data);
                        placeholder.innerText = "Scan Complete! ✅";
                    }
                } catch(err) {
                    placeholder.innerText = "Error analyzing.";
                }
            }
        });

        async function displayPlan(data) {
            const list = document.getElementById('plan-list');
            list.innerHTML = ''; 
            data.treatment_plan.forEach(item => {
                let borderColor = item.color === 'green' ? 'var(--success)' : (item.color === 'red' ? 'var(--danger)' : '#fbbf24');
                list.innerHTML += `<li style="background: white; padding: 1rem; margin-bottom: 0.5rem; border-radius: 0.5rem; border-left: 4px solid ${borderColor}; box-shadow: var(--shadow); font-size: 0.8rem; font-weight: 700;">${item.title}: <span style="font-weight: 400; color: var(--text-muted);">${item.action}</span></li>`;
            });
            document.getElementById('results-card').classList.remove('hidden');
        }

        document.getElementById('scan-manual-btn').addEventListener('click', async () => {
            const payload = { 
                fcl: sliders.fcl.value, 
                alk: sliders.alk.value, 
                ph: sliders.ph.value, 
                th: sliders.th.value,
                volume: savedVolume
            };
            const response = await fetch('/scan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            displayPlan(await response.json());
        });
    </script>
{% endblock %}
