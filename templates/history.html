<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Pro AI - History Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex justify-center py-0 md:py-8">

    <div class="bg-slate-800 w-full max-w-md md:rounded-3xl shadow-2xl overflow-hidden border border-slate-700 flex flex-col min-h-screen md:min-h-0">
        
        <!-- Header -->
        <div class="bg-cyan-600 text-white text-center py-6 px-4 shadow-md relative">
            <a href="/" class="absolute left-4 top-6 text-cyan-200 hover:text-white text-sm font-bold flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back
            </a>
            <h1 class="text-xl font-black tracking-wide">Pool Dashboard 📈</h1>
            <p class="text-cyan-100 text-xs font-bold uppercase tracking-widest mt-1">Health Trends</p>
        </div>

        <!-- Chart Section -->
        <div class="p-4 bg-slate-800 border-b border-slate-700">
            <div class="bg-slate-900 rounded-xl p-4 shadow-inner border border-slate-700">
                <canvas id="historyChart" height="200" 
                    data-labels='{{ labels | tojson | safe }}' 
                    data-fcl='{{ fcl_data | tojson | safe }}' 
                    data-ph='{{ ph_data | tojson | safe }}'>
                </canvas>
            </div>
        </div>

        <!-- History Feed -->
        <div class="p-4 flex-grow flex flex-col space-y-4 overflow-y-auto bg-slate-800">
            <h2 class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Recent Scans</h2>
            
            {% for row in scans %}
            <div class="bg-slate-700 p-4 rounded-xl shadow-sm border border-slate-600">
                <div class="flex justify-between items-center mb-4 border-b border-slate-600 pb-2">
                    <span class="text-xs font-bold text-slate-300">{{ row[1] }}</span>
                    <span class="text-[10px] font-bold bg-slate-800 text-cyan-400 py-1 px-3 rounded-full border border-slate-600">🌤️ {{ row[6] }}</span>
                </div>
                
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div>
                        <p class="text-[10px] uppercase text-slate-400 font-bold">FCL</p>
                        <p class="text-lg font-black text-white">{{ row[2] }}</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase text-slate-400 font-bold">ALK</p>
                        <p class="text-lg font-black text-white">{{ row[3] }}</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase text-slate-400 font-bold">pH</p>
                        <p class="text-lg font-black text-white">{{ row[4] }}</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase text-slate-400 font-bold">Hardness</p>
                        <p class="text-lg font-black text-white">{{ row[5] }}</p>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="text-center py-10 text-slate-500">
                <p>No scans found.</p>
                <p class="text-sm mt-2">Go dip a strip in the pool!</p>
            </div>
            {% endfor %}

        </div>
    </div>

    <!-- Inject Chart Data -->
    <script>
        const canvas = document.getElementById('historyChart');
        const ctx = canvas.getContext('2d');
        
        // Safely parse data from HTML attributes to keep the JS linter happy
        const labels = JSON.parse(canvas.dataset.labels);
        const fclData = JSON.parse(canvas.dataset.fcl);
        const phData = JSON.parse(canvas.dataset.ph);

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Chlorine (FCL)',
                        data: fclData,
                        borderColor: 'rgba(34, 211, 238, 1)', // Cyan 400
                        backgroundColor: 'rgba(34, 211, 238, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: 'rgba(34, 211, 238, 1)',
                        tension: 0.4,
                        yAxisID: 'y'
                    },
                    {
                        label: 'pH Level',
                        data: phData,
                        borderColor: 'rgba(249, 115, 22, 1)', // Orange 500
                        backgroundColor: 'rgba(249, 115, 22, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: 'rgba(249, 115, 22, 1)',
                        tension: 0.4,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#94a3b8', // slate-400
                            font: { size: 10, weight: 'bold' }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: '#64748b', font: { size: 10 } }, // slate-500
                        grid: { color: 'rgba(71, 85, 105, 0.2)' }
                    },
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        ticks: { color: 'rgba(34, 211, 238, 1)' },
                        grid: { color: 'rgba(71, 85, 105, 0.2)' },
                        suggestedMin: 0,
                        suggestedMax: 5
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        ticks: { color: 'rgba(249, 115, 22, 1)' },
                        grid: { drawOnChartArea: false },
                        suggestedMin: 6.8,
                        suggestedMax: 8.4
                    }
                }
            }
        });
    </script>
</body>
</html>
